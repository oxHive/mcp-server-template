[template]
cargo_generate_version = ">=0.21.0"
ignore = ["hooks", "docs", "README.md"]

[conditional.'!include_db']
ignore = ["src/db.rs", "src/store.rs", "migrations"]

[conditional.'!include_dashboard']
ignore = ["{{dashboard_dir}}"]

[placeholders.project_description]
type = "string"
prompt = "Short description of what your MCP server does"

[placeholders.include_db]
type = "bool"
prompt = "Include SQLite storage layer (libsql)?"
default = false

[placeholders.include_dashboard]
type = "bool"
prompt = "Include Vue dashboard? (optional web UI, scaffolded via bun create vue)"
default = false

[placeholders.dashboard_dir]
type = "string"
prompt = "Dashboard directory name? (dashboard / web / ui)"
default = "dashboard"
